<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Painel Administrativo | ADVIC</title>

  <!-- Impede que o painel seja indexado por motores de busca -->
  <meta name="robots" content="noindex, nofollow" />

  <!-- Favicon com caminho correto relativo à pasta /admin/ -->
  <link rel="icon" type="image/png" href="../imagens/logo.png" />

  <!-- Widget de autenticação Netlify Identity (deve carregar antes do CMS) -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <style>
    /* ── Variáveis de cor da ADVIC ─────────────────────────── */
    :root {
      --color-primary: #0f8c95;
      --color-hover:   #0b6b72;
      --color-bg:      #f4f7f6;
    }

    body {
      background-color: var(--color-bg);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 0;
    }

    /* ── Painel de login do Netlify Identity ───────────────── */
    iframe#netlify-identity-widget {
      z-index: 9999 !important;
    }

    .netlify-identity-menu {
      background-color: var(--color-primary) !important;
    }

    /* ── Cor primária do Decap CMS ─────────────────────────── */
    [class*="AppHeader"],
    [class*="Button-button-default-primary"],
    [class*="Toggle-activeBackground"] {
      background-color: var(--color-primary) !important;
    }

    [class*="Button-button-default-primary"]:hover {
      background-color: var(--color-hover) !important;
    }

    [class*="UI-text-primary"],
    [class*="TopBarNavList"] a:hover,
    [class*="SidebarLink"]:hover,
    [class*="SidebarLink-active"] {
      color: var(--color-primary) !important;
    }

    /* ── Responsividade em dispositivos móveis ─────────────── */
    /* O Decap CMS não é mobile-first; estas regras corrigem    */
    /* o layout para ecrãs menores de 850 px.                  */
    @media screen and (max-width: 850px) {

      /* 1. Empilha sidebar + conteúdo verticalmente */
      #nc-root > div > div {
        display: flex !important;
        flex-direction: column !important;
        min-height: 100vh !important;
      }

      /* 2. Sidebar ocupa a largura total no topo */
      aside {
        width: 100% !important;
        max-width: 100% !important;
        min-width: 100% !important;
        position: relative !important;
        border-right: none !important;
        border-bottom: 2px solid #e2e8f0 !important;
      }

      /* 3. Área principal ocupa o restante */
      main {
        width: 100% !important;
        max-width: 100% !important;
        min-width: 100% !important;
      }

      /* 4. Remove divisor arrastável e esconde pré-visualização */
      .Resizer,
      span[role="presentation"] {
        display: none !important;
      }

      .Pane,
      .Pane1 {
        width: 100% !important;
        max-width: 100% !important;
        position: static !important;
      }

      /* Pré-visualização ocupa muito espaço e não é útil no móvel */
      .Pane2,
      [class*="PreviewPane"] {
        display: none !important;
      }

      /* 5. Formulário de edição sem overflow */
      [class*="EditorContainer"] {
        padding: 0 !important;
        width: 100% !important;
      }

      [class*="ControlPaneContainer"] {
        width: 100% !important;
        max-width: 100% !important;
        padding: 15px !important;
      }

      /* 6. Campos de formulário não excedem o ecrã */
      input,
      textarea,
      select {
        width: 100% !important;
        max-width: 100% !important;
        box-sizing: border-box !important;
      }

      /* 7. Barra superior (botão Guardar) em linha própria */
      [class*="TopBarContainer"] {
        display: flex !important;
        flex-wrap: wrap !important;
        height: auto !important;
        padding: 10px !important;
      }

      [class*="TopBarContainer"] > div {
        width: 100% !important;
        flex: 1 1 100% !important;
      }
    }
  </style>
</head>

<body>
  <!--
    Decap CMS carregado via jsDelivr (CDN estável e com SRI disponível).
    Versão fixada em @3 para receber patches mas não quebrar em major updates.
  -->
  <script src="https://cdn.jsdelivr.net/npm/decap-cms@3/dist/decap-cms.js"></script>

  <script>
    // Aplica os estilos do site ao painel de pré-visualização do CMS
    // Importante: usar caminhos relativos ao domínio raiz (/) e não à pasta /admin/
    CMS.registerPreviewStyle("/style.css");
    CMS.registerPreviewStyle("https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css");
    CMS.registerPreviewStyle("https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css");
  </script>
</body>

</html>
