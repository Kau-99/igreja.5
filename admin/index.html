<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel Administrativo | ADVIC</title>
  <meta name="robots" content="noindex, nofollow" />

  <link rel="icon" href="../imagens/favicons/favicon.ico" sizes="48x48" />
  <link rel="icon" type="image/png" sizes="32x32" href="../imagens/favicons/favicon-32x32.png" />

  <!-- Fraunces + Inter — mesmas fontes do site principal -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..640;1,9..144,400..640&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet" />

  <!-- Netlify Identity (deve carregar ANTES do Decap CMS) -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <style>
    /* ══════════════════════════════════════════════════════════════
       VARIÁVEIS E RESET
    ══════════════════════════════════════════════════════════════ */
    :root {
      /* Paleta "Reverência Contemporânea" — a mesma do site */
      --p:     #0E4B4F;  /* petróleo institucional */
      --p-d:   #0A3A3E;  /* petróleo escuro        */
      --p-l:   #8FC1BD;  /* petróleo claro          */
      --amber: #C9922E;  /* acento âmbar            */
      --bg:    #F7F4EF;  /* osso                    */
      --card:  #FCFAF6;
      --text:  #221E19;
      --muted: #675F51;
      --border:#E3DCD0;
      --r:     12px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      min-height: 100dvh;
    }

    /* ══════════════════════════════════════════════════════════════
       TELA DE CARREGAMENTO
       Exibida enquanto o Decap CMS (React SPA ~2 MB) inicializa.
    ══════════════════════════════════════════════════════════════ */
    #admin-loading {
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: linear-gradient(180deg, #071F23 0%, #0B3237 60%, #092B30 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.75rem;
      transition: opacity .5s ease, visibility .5s ease;
    }
    #admin-loading.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .adm-logo {
      width: 96px;
      height: 96px;
      border-radius: 22px;
      object-fit: contain;
      background: rgba(243,238,227,.07);
      padding: 8px;
      animation: adm-glow 2.6s ease-in-out infinite;
    }
    @keyframes adm-glow {
      0%,100% { box-shadow: 0 0 26px rgba(217,168,78,.25); }
      50%      { box-shadow: 0 0 52px rgba(217,168,78,.5); }
    }
    .adm-brand {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: .4rem;
    }
    .adm-brand strong {
      font-family: 'Fraunces', Georgia, serif;
      color: #F3EEE3;
      font-size: 1.6rem;
      font-weight: 560;
      letter-spacing: -.02em;
    }
    .adm-brand span {
      color: rgba(243,238,227,.55);
      font-size: .78rem;
      font-weight: 600;
      letter-spacing: .16em;
      text-transform: uppercase;
    }
    .adm-bar-wrap {
      width: 180px;
      height: 3px;
      background: rgba(243,238,227,.14);
      border-radius: 999px;
      overflow: hidden;
    }
    .adm-bar {
      height: 100%;
      background: linear-gradient(90deg, #D9A84E, #C9922E);
      border-radius: 999px;
      animation: adm-sweep 1.6s ease-in-out infinite;
    }
    @keyframes adm-sweep {
      0%   { width: 0%;   margin-left: 0%; }
      55%  { width: 60%;  margin-left: 20%; }
      100% { width: 0%;   margin-left: 100%; }
    }

    /* ══════════════════════════════════════════════════════════════
       WIDGET NETLIFY IDENTITY — GARANTE z-index ALTO
    ══════════════════════════════════════════════════════════════ */
    iframe#netlify-identity-widget { z-index: 100000 !important; }

    /* ══════════════════════════════════════════════════════════════
       BRANDING DO DECAP CMS
       Usa [class*="..."] para resistir a nomes de classes com hash.
    ══════════════════════════════════════════════════════════════ */

    /* Barra de navegação principal */
    [class*="AppHeader"],
    [class*="AppHeaderContent"],
    [class*="Nav-"] header {
      background: var(--p) !important;
    }

    /* Botão primário (Publicar, Guardar) */
    [class*="button"][class*="primary"],
    [class*="Button"][class*="primary"],
    button[class*="ButtonPrimary"] {
      background: var(--p) !important;
      border-color: var(--p) !important;
    }
    [class*="button"][class*="primary"]:hover,
    [class*="Button"][class*="primary"]:hover {
      background: var(--p-d) !important;
      border-color: var(--p-d) !important;
    }

    /* Toggle (boolean fields) */
    [class*="Toggle"][class*="active"],
    [class*="ActiveBackground"],
    [class*="toggle"][class*="checked"] {
      background: var(--p) !important;
    }

    /* Texto e links primários */
    [class*="text-primary"],
    [class*="TextPrimary"],
    [class*="SidebarLink"]:hover,
    [class*="NavLink"]:hover,
    [class*="activeLink"],
    [class*="active"][class*="Link"] {
      color: var(--p) !important;
    }

    /* Foco acessível consistente */
    *:focus-visible {
      outline: 2px solid var(--p-l) !important;
      outline-offset: 2px !important;
    }

    /* ══════════════════════════════════════════════════════════════
       RESPONSIVIDADE — TELAS ATÉ 900px
       O Decap CMS é uma SPA React não responsiva por padrão.
    ══════════════════════════════════════════════════════════════ */
    @media screen and (max-width: 900px) {

      /* 1. Layout principal em coluna */
      #nc-root > div > div,
      [class*="AppMainContainer"],
      [class*="EditorContainer"] > div {
        flex-direction: column !important;
        min-height: auto !important;
      }

      /* 2. Sidebar / nav lateral → largura total no topo */
      aside,
      [class*="Sidebar"],
      [class*="NavSidebar"],
      [class*="CollectionNav"] {
        width: 100% !important;
        max-width: 100% !important;
        min-width: 0 !important;
        position: static !important;
        border-right: none !important;
        border-bottom: 1px solid var(--border) !important;
        flex-shrink: 0 !important;
        overflow-x: auto !important;
      }

      /* 3. Conteúdo principal sem overflow */
      main,
      [class*="AppMainContainer"],
      [class*="Collection"] {
        width: 100% !important;
        max-width: 100% !important;
        min-width: 0 !important;
        overflow-x: hidden !important;
      }

      /* 4. Oculta pré-visualização e divisor arrastável */
      .Pane2,
      [class*="Pane2"],
      [class*="PreviewPane"],
      [class*="previewPane"],
      .Resizer,
      span[role="presentation"] {
        display: none !important;
      }

      /* 5. Painel de edição → 100% */
      .Pane,
      .Pane1,
      [class*="Pane1"],
      [class*="ControlPane"] {
        width: 100% !important;
        max-width: 100% !important;
        position: static !important;
        flex: 1 1 auto !important;
      }

      /* 6. Formulário de edição sem padding excessivo */
      [class*="EditorContainer"],
      [class*="ControlPaneContainer"],
      [class*="FieldWrapper"],
      [class*="ControlContainer"] {
        padding: .75rem !important;
        width: 100% !important;
        max-width: 100% !important;
        box-sizing: border-box !important;
      }

      /* 7. Inputs sem overflow + font-size 16px evita zoom no iOS */
      input,
      textarea,
      select,
      [class*="StyledTextInput"],
      [class*="StyledSelect"],
      [class*="NumberInput"],
      [class*="DateInput"] {
        width: 100% !important;
        max-width: 100% !important;
        min-width: 0 !important;
        box-sizing: border-box !important;
        font-size: 16px !important;
      }

      /* 8. Barra de topo (botão Publicar) responsiva */
      [class*="ToolbarContainer"],
      [class*="EditorToolbar"],
      [class*="TopBarContainer"] {
        display: flex !important;
        flex-wrap: wrap !important;
        height: auto !important;
        min-height: 0 !important;
        padding: .75rem !important;
        gap: .5rem !important;
      }

      /* 9. Grelha de itens em coluna única */
      [class*="CardGrid"],
      [class*="EntryList"] ul,
      [class*="Collection"] ul {
        grid-template-columns: 1fr !important;
        display: flex !important;
        flex-direction: column !important;
        padding: .75rem !important;
        gap: .75rem !important;
      }

      /* 10. Cards de entrada compactos */
      [class*="EntryCard"],
      [class*="CardBody"],
      [class*="ListEntry"] {
        padding: .85rem !important;
        width: 100% !important;
      }

      /* 11. Botões não cortados */
      [class*="ToolbarButton"],
      [class*="EditorButton"] {
        flex-shrink: 0 !important;
        white-space: nowrap !important;
      }
    }

    /* ══════════════════════════════════════════════════════════════
       RESPONSIVIDADE — TELAS ATÉ 600px
    ══════════════════════════════════════════════════════════════ */
    @media screen and (max-width: 600px) {

      /* Barra de pesquisa full width */
      [class*="SearchContainer"],
      [class*="SearchInput"],
      [class*="Searchbar"] {
        width: 100% !important;
        max-width: 100% !important;
      }

      /* Imagens na media library em grelha 2 colunas */
      [class*="ImageCard"],
      [class*="MediaCard"] {
        width: calc(50% - .5rem) !important;
      }

      /* Botões de ação menores para caber na tela */
      [class*="ToolbarButton"] {
        padding: .4rem .7rem !important;
        font-size: .8rem !important;
      }

      /* Reduz padding dos painéis */
      [class*="ControlPaneContainer"],
      [class*="FieldWrapper"] {
        padding: .5rem !important;
      }
    }

    /* ══════════════════════════════════════════════════════════════
       CENTRAL DE CONTROLE — barra de atalhos rápidos
       Injetada por JS depois que o CMS termina de carregar.
    ══════════════════════════════════════════════════════════════ */
    .adm-shortcuts {
      position: fixed;
      left: 1rem;
      bottom: 1rem;
      z-index: 9000;
      display: flex;
      align-items: center;
      gap: .4rem;
      background: #0B3237;
      border: 1px solid rgba(243,238,227,.18);
      border-radius: 999px;
      padding: .35rem .5rem;
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
      font-size: .8rem;
    }
    .adm-shortcuts strong {
      color: #D9A84E;
      font-weight: 600;
      font-size: .66rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      padding: 0 .4rem 0 .6rem;
      user-select: none;
    }
    .adm-shortcuts a {
      color: #F3EEE3;
      text-decoration: none;
      font-weight: 600;
      padding: .35rem .7rem;
      border-radius: 999px;
      transition: background .2s ease, color .2s ease;
      white-space: nowrap;
    }
    .adm-shortcuts a:hover {
      background: #F3EEE3;
      color: #0B3237;
    }
    .adm-shortcuts button {
      background: none;
      border: 0;
      color: rgba(243,238,227,.55);
      font-size: 1rem;
      line-height: 1;
      padding: .3rem .45rem;
      cursor: pointer;
      border-radius: 50%;
    }
    .adm-shortcuts button:hover { color: #F3EEE3; }
    @media (max-width: 700px) {
      .adm-shortcuts { display: none; } /* no celular o espaço é do editor */
    }

    /* ══════════════════════════════════════════════════════════════
       SCROLL SMOOTH — boas práticas
    ══════════════════════════════════════════════════════════════ */
    html { scroll-behavior: smooth; }
  </style>
</head>

<body>

  <!-- ══════════════════════════════════════════════════════════════
       TELA DE CARREGAMENTO ADVIC
       Visível enquanto o Decap CMS (SPA ~2 MB) inicializa.
       Ocultada automaticamente por JS quando o CMS renderizar.
  ══════════════════════════════════════════════════════════════ -->
  <div id="admin-loading" role="status" aria-live="polite" aria-label="Carregando painel administrativo">
    <img src="../imagens/logo.png" alt="Logo ADVIC" class="adm-logo" width="96" height="96" />
    <div class="adm-brand">
      <strong>Painel ADVIC</strong>
      <span>A carregar o painel administrativo…</span>
    </div>
    <div class="adm-bar-wrap" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
      <div class="adm-bar"></div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════════════
       DECAP CMS
       Carregado via jsDelivr (CDN rápido e estável).
       Versão @3 fixada para receber patches sem quebrar major.
       Documentação: https://decapcms.org/docs/
  ══════════════════════════════════════════════════════════════ -->
  <script src="https://cdn.jsdelivr.net/npm/decap-cms@3/dist/decap-cms.js"></script>

  <script>
    /* ── Estilos do site no painel de pré-visualização ────────── */
    /* Caminhos relativos ao domínio raiz (/), não à pasta /admin/ */
    CMS.registerPreviewStyle('/style.css');
    CMS.registerPreviewStyle('https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css');
    CMS.registerPreviewStyle('https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css');

    /* ── Preview: Evento ──────────────────────────────────────── */
    var EventoPreview = function(props) {
      var h   = window.h; // Decap 3 expõe h(); window.React não existe mais
      var e   = props.entry;
      var get = function(k) { return e.getIn(['data', k]) || ''; };

      return h('div', { style: { padding: '1.5rem', fontFamily: 'Inter, sans-serif' } },
        h('div', {
          style: {
            background: '#FCFAF6',
            borderRadius: '14px',
            border: '1px solid #E3DCD0',
            overflow: 'hidden',
            maxWidth: '380px',
            boxShadow: '0 10px 24px rgba(0,0,0,.08)',
          }
        },
          get('imagem') && h('img', {
            src: get('imagem'),
            alt: get('titulo'),
            style: { width: '100%', height: '210px', objectFit: 'cover', display: 'block' }
          }),
          h('div', { style: { padding: '1rem' } },
            h('span', {
              style: {
                display: 'inline-block', padding: '.2rem .7rem',
                background: '#EFEAE1', color: '#0E4B4F',
                borderRadius: '999px', fontSize: '.8rem',
                fontWeight: 700, marginBottom: '.5rem',
                border: '1px solid #E3DCD0'
              }
            }, get('tipo') || 'evento'),
            h('h3', { style: { fontFamily: 'Fraunces, Georgia, serif', color: '#0E4B4F', margin: '.25rem 0' } },
              get('titulo') || 'Título do Evento'),
            h('p',  { style: { color: '#675F51', fontSize: '.9rem', margin: '.5rem 0' } },
              get('dataExibicao') || 'Data do evento'),
            h('p',  { style: { fontSize: '.95rem', lineHeight: 1.6 } },
              get('descricao') || 'Descrição do evento.')
          )
        )
      );
    };
    CMS.registerPreviewTemplate('eventos', EventoPreview);

    /* ── Preview: Sermão ──────────────────────────────────────── */
    var SermaoPreview = function(props) {
      var h   = window.h; // Decap 3 expõe h(); window.React não existe mais
      var e   = props.entry;
      var get = function(k) { return e.getIn(['data', k]) || ''; };

      return h('div', { style: { padding: '1.5rem', fontFamily: 'Inter, sans-serif' } },
        h('div', {
          style: {
            background: '#FCFAF6',
            borderRadius: '14px',
            border: '1px solid #E3DCD0',
            padding: '1.25rem',
            maxWidth: '420px',
            boxShadow: '0 10px 24px rgba(0,0,0,.08)',
          }
        },
          h('h3', { style: { fontFamily: 'Fraunces, Georgia, serif', color: '#0E4B4F', marginBottom: '.25rem' } },
            get('titulo') || 'Título do Sermão'),
          h('p',  { style: { color: '#675F51', fontSize: '.9rem', marginBottom: '1rem' } },
            get('pregadorData') || 'Pr. Nome — Data'),
          get('linkVideo') && h('a', {
            href: get('linkVideo'),
            target: '_blank',
            rel: 'noopener',
            style: {
              display: 'inline-flex', alignItems: 'center', gap: '.4rem',
              background: '#dc2626', color: '#fff',
              padding: '.5rem 1rem', borderRadius: '999px',
              textDecoration: 'none', fontSize: '.9rem', fontWeight: 600
            }
          }, '▶  Assistir no YouTube'),
          get('audioDisponivel') && h('p', {
            style: { marginTop: '.75rem', color: '#0E4B4F', fontSize: '.9rem', fontWeight: 500 }
          }, '🎵  Áudio disponível')
        )
      );
    };
    CMS.registerPreviewTemplate('sermoes', SermaoPreview);

    /* ── Preview: Líder ───────────────────────────────────────── */
    var LiderPreview = function(props) {
      var h   = window.h; // Decap 3 expõe h(); window.React não existe mais
      var e   = props.entry;
      var get = function(k) { return e.getIn(['data', k]) || ''; };

      return h('div', { style: { padding: '1.5rem', fontFamily: 'Inter, sans-serif' } },
        h('div', {
          style: {
            background: '#FCFAF6', borderRadius: '14px',
            border: '1px solid #E3DCD0', overflow: 'hidden',
            maxWidth: '220px', boxShadow: '0 10px 24px rgba(0,0,0,.08)',
            textAlign: 'center', padding: '1.25rem'
          }
        },
          get('imagem') && h('img', {
            src: get('imagem'), alt: get('nome'),
            style: { width: '120px', height: '120px', borderRadius: '50%',
                     objectFit: 'cover', display: 'block', margin: '0 auto .75rem' }
          }),
          h('h3', { style: { fontFamily: 'Fraunces, Georgia, serif', color: '#0E4B4F',
                             fontSize: '1rem', marginBottom: '.25rem' } },
            get('nome') || 'Nome do Líder'),
          h('span', { style: { color: '#675F51', fontSize: '.85rem' } },
            get('cargo') || 'Cargo / Função')
        )
      );
    };
    CMS.registerPreviewTemplate('lideranca', LiderPreview);

    /* ── Oculta a tela de carregamento quando o CMS renderizar ── */
    /* Estratégia: verificar periodicamente se o header do CMS     */
    /* está no DOM (sinal de que o React terminou de montar).      */
    var _loadingEl   = document.getElementById('admin-loading');
    var _hideLoader  = function() {
      if (_loadingEl) _loadingEl.classList.add('hidden');
    };
    /* ── Central de controle: atalhos rápidos após o CMS abrir ── */
    var _addShortcuts = function() {
      if (document.querySelector('.adm-shortcuts')) return;
      var bar = document.createElement('nav');
      bar.className = 'adm-shortcuts';
      bar.setAttribute('aria-label', 'Atalhos rápidos');
      bar.innerHTML =
        '<strong>ADVIC</strong>' +
        '<a href="/" target="_blank" rel="noopener">Ver o site</a>' +
        '<a href="/galeria" target="_blank" rel="noopener">Galeria</a>' +
        // Fotos de celular costumam ter 5 MB ou mais. Cada imagem enviada pelo
        // painel vira um commit permanente, então deixo o compressor à mão.
        '<a href="https://squoosh.app/" target="_blank" rel="noopener noreferrer" ' +
        'title="Reduza o tamanho da foto antes de enviar">Comprimir foto</a>' +
        '<a href="https://www.youtube.com/@advicof" target="_blank" rel="noopener noreferrer">YouTube</a>' +
        '<button type="button" aria-label="Fechar atalhos" title="Fechar">×</button>';
      bar.querySelector('button').addEventListener('click', function() { bar.remove(); });
      document.body.appendChild(bar);
    };

    var _checkReady  = setInterval(function() {
      var appReady =
        document.querySelector('#nc-root header')             ||
        document.querySelector('[class*="AppHeader"]')        ||
        document.querySelector('[class*="AppHeaderContent"]') ||
        document.querySelector('[data-testid="cms-main"]')    ||
        document.querySelector('header[class*="css-"]')       ||
        document.querySelector('.nc-appHeader-root');
      if (appReady) { _hideLoader(); _addShortcuts(); clearInterval(_checkReady); }
    }, 250);
    /* Fallback máximo: 8 s (rede lenta / dispositivos lentos) */
    setTimeout(function() { _hideLoader(); clearInterval(_checkReady); }, 8000);
  </script>

</body>
</html>
