<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Painel Institucional | ADVIC</title>

  <link rel="icon" type="image/png" href="../imagens/logo.png" />
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <style>
    :root {
      --color-primary: #0f8c95;
      --color-hover: #0b6b72;
      --color-bg: #f4f7f6;
    }

    body {
      background-color: var(--color-bg);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 0;
    }

    iframe#netlify-identity-widget {
      z-index: 9999 !important;
    }

    .netlify-identity-menu {
      background-color: var(--color-primary) !important;
    }

    [class*="AppHeader"],
    [class*="Button-button-default-primary"],
    [class*="Toggle-activeBackground"] {
      background-color: var(--color-primary) !important;
    }

    [class*="Button-button-default-primary"]:hover {
      background-color: var(--color-hover) !important;
    }

    [class*="UI-text-primary"],
    [class*="TopBarNavList"] a:hover,
    [class*="SidebarLink"]:hover,
    [class*="SidebarLink-active"] {
      color: var(--color-primary) !important;
    }

    [class*="Card-card"],
    [class*="ControlPaneContainer"],
    [class*="PreviewPaneContainer"] {
      border-radius: 12px !important;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04) !important;
      border: none !important;
    }

    [class*="Button-button"] {
      border-radius: 8px !important;
      font-weight: 600 !important;
    }

    [class*="Input-input"],
    [class*="Select-select"] {
      border-radius: 8px !important;
      border: 1px solid #e2e8f0 !important;
      padding: 10px 14px !important;
      background-color: #ffffff !important;
      transition: all 0.2s ease !important;
    }

    [class*="Input-input"]:focus,
    [class*="Select-select"]:focus {
      border-color: var(--color-primary) !important;
      box-shadow: 0 0 0 3px rgba(15, 140, 149, 0.15) !important;
      outline: none !important;
    }

    @media screen and (max-width: 768px) {
      [class*="AppMainContainer"] {
        min-width: 100vw !important;
        overflow-x: hidden !important;
      }

      [class*="SidebarContainer"] {
        width: 100% !important;
        padding: 15px !important;
        border-right: none !important;
        border-bottom: 1px solid #e2e8f0 !important;
        position: relative !important;
        background-color: #fff;
      }

      [class*="EditorContainer"] {
        flex-direction: column !important;
        overflow-y: auto !important;
      }

      [class*="PreviewPaneContainer"] {
        display: none !important;
      }

      [class*="EditorPaneContainer"],
      [class*="ControlPaneContainer"] {
        width: 100% !important;
        max-width: 100% !important;
        padding: 5px !important;
      }

      [class*="TopBarContainer"] {
        flex-wrap: wrap !important;
        height: auto !important;
        padding: 10px !important;
        gap: 10px !important;
      }

      [class*="TopBarContainer"]>div {
        flex: 1 1 100% !important;
        justify-content: space-between !important;
      }

      [class*="CollectionContainer"] {
        padding: 10px !important;
      }

      [class*="Card-card"] {
        margin-bottom: 15px !important;
      }
    }
  </style>
</head>

<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    CMS.registerPreviewStyle("../style.css");
    CMS.registerPreviewStyle("https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css");
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>
</body>

</html>
