<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel Administrativo | ADVIC</title>
  <meta name="robots" content="noindex, nofollow" />

  <link rel="icon" type="image/png" href="../imagens/logo.png" />

  <!-- Inter — mesma fonte do site principal -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Netlify Identity (deve carregar ANTES do Decap CMS) -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <style>
    /* ══════════════════════════════════════════════════════════════
       VARIÁVEIS E RESET
    ══════════════════════════════════════════════════════════════ */
    :root {
      --p:    #0f8c95;  /* primary    */
      --p-d:  #0b6b72;  /* primary dark */
      --p-l:  #1fc9d6;  /* primary light */
      --bg:   #f0f5f5;
      --card: #ffffff;
      --text: #1f2937;
      --muted:#6b7280;
      --border:#e5e7eb;
      --r:    12px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      min-height: 100dvh;
    }

    /* ══════════════════════════════════════════════════════════════
       TELA DE CARREGAMENTO
       Exibida enquanto o Decap CMS (React SPA ~2 MB) inicializa.
    ══════════════════════════════════════════════════════════════ */
    #admin-loading {
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: radial-gradient(ellipse at 30% 40%, #0d6b72 0%, #04282c 55%, #020d0e 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.75rem;
      transition: opacity .5s ease, visibility .5s ease;
    }
    #admin-loading.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .adm-logo {
      width: 96px;
      height: 96px;
      border-radius: 22px;
      object-fit: contain;
      background: rgba(255,255,255,.06);
      padding: 8px;
      animation: adm-glow 2.4s ease-in-out infinite;
    }
    @keyframes adm-glow {
      0%,100% { box-shadow: 0 0 30px rgba(31,201,214,.35); }
      50%      { box-shadow: 0 0 60px rgba(31,201,214,.65); }
    }
    .adm-brand {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: .4rem;
    }
    .adm-brand strong {
      color: #fff;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -.02em;
    }
    .adm-brand span {
      color: rgba(255,255,255,.5);
      font-size: .85rem;
      letter-spacing: .03em;
    }
    .adm-bar-wrap {
      width: 180px;
      height: 3px;
      background: rgba(255,255,255,.12);
      border-radius: 999px;
      overflow: hidden;
    }
    .adm-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--p-l), var(--p));
      border-radius: 999px;
      animation: adm-sweep 1.6s ease-in-out infinite;
    }
    @keyframes adm-sweep {
      0%   { width: 0%;   margin-left: 0%; }
      55%  { width: 60%;  margin-left: 20%; }
      100% { width: 0%;   margin-left: 100%; }
    }

    /* ══════════════════════════════════════════════════════════════
       WIDGET NETLIFY IDENTITY — GARANTE z-index ALTO
    ══════════════════════════════════════════════════════════════ */
    iframe#netlify-identity-widget { z-index: 100000 !important; }

    /* ══════════════════════════════════════════════════════════════
       BRANDING DO DECAP CMS
       Usa [class*="..."] para resistir a nomes de classes com hash.
    ══════════════════════════════════════════════════════════════ */

    /* Barra de navegação principal */
    [class*="AppHeader"],
    [class*="AppHeaderContent"],
    [class*="Nav-"] header {
      background: var(--p) !important;
    }

    /* Botão primário (Publicar, Guardar) */
    [class*="button"][class*="primary"],
    [class*="Button"][class*="primary"],
    button[class*="ButtonPrimary"] {
      background: var(--p) !important;
      border-color: var(--p) !important;
    }
    [class*="button"][class*="primary"]:hover,
    [class*="Button"][class*="primary"]:hover {
      background: var(--p-d) !important;
      border-color: var(--p-d) !important;
    }

    /* Toggle (boolean fields) */
    [class*="Toggle"][class*="active"],
    [class*="ActiveBackground"],
    [class*="toggle"][class*="checked"] {
      background: var(--p) !important;
    }

    /* Texto e links primários */
    [class*="text-primary"],
    [class*="TextPrimary"],
    [class*="SidebarLink"]:hover,
    [class*="NavLink"]:hover,
    [class*="activeLink"],
    [class*="active"][class*="Link"] {
      color: var(--p) !important;
    }

    /* Foco acessível consistente */
    *:focus-visible {
      outline: 2px solid var(--p-l) !important;
      outline-offset: 2px !important;
    }

    /* ══════════════════════════════════════════════════════════════
       RESPONSIVIDADE — TELAS ATÉ 900px
       O Decap CMS é uma SPA React não responsiva por padrão.
    ══════════════════════════════════════════════════════════════ */
    @media screen and (max-width: 900px) {

      /* 1. Layout principal em coluna */
      #nc-root > div > div,
      [class*="AppMainContainer"],
      [class*="EditorContainer"] > div {
        flex-direction: column !important;
        min-height: auto !important;
      }

      /* 2. Sidebar / nav lateral → largura total no topo */
      aside,
      [class*="Sidebar"],
      [class*="NavSidebar"],
      [class*="CollectionNav"] {
        width: 100% !important;
        max-width: 100% !important;
        min-width: 0 !important;
        position: static !important;
        border-right: none !important;
        border-bottom: 1px solid var(--border) !important;
        flex-shrink: 0 !important;
        overflow-x: auto !important;
      }

      /* 3. Conteúdo principal sem overflow */
      main,
      [class*="AppMainContainer"],
      [class*="Collection"] {
        width: 100% !important;
        max-width: 100% !important;
        min-width: 0 !important;
        overflow-x: hidden !important;
      }

      /* 4. Oculta pré-visualização e divisor arrastável */
      .Pane2,
      [class*="Pane2"],
      [class*="PreviewPane"],
      [class*="previewPane"],
      .Resizer,
      span[role="presentation"] {
        display: none !important;
      }

      /* 5. Painel de edição → 100% */
      .Pane,
      .Pane1,
      [class*="Pane1"],
      [class*="ControlPane"] {
        width: 100% !important;
        max-width: 100% !important;
        position: static !important;
        flex: 1 1 auto !important;
      }

      /* 6. Formulário de edição sem padding excessivo */
      [class*="EditorContainer"],
      [class*="ControlPaneContainer"],
      [class*="FieldWrapper"],
      [class*="ControlContainer"] {
        padding: .75rem !important;
        width: 100% !important;
        max-width: 100% !important;
        box-sizing: border-box !important;
      }

      /* 7. Inputs sem overflow + font-size 16px evita zoom no iOS */
      input,
      textarea,
      select,
      [class*="StyledTextInput"],
      [class*="StyledSelect"],
      [class*="NumberInput"],
      [class*="DateInput"] {
        width: 100% !important;
        max-width: 100% !important;
        min-width: 0 !important;
        box-sizing: border-box !important;
        font-size: 16px !important;
      }

      /* 8. Barra de topo (botão Publicar) responsiva */
      [class*="ToolbarContainer"],
      [class*="EditorToolbar"],
      [class*="TopBarContainer"] {
        display: flex !important;
        flex-wrap: wrap !important;
        height: auto !important;
        min-height: 0 !important;
        padding: .75rem !important;
        gap: .5rem !important;
      }

      /* 9. Grelha de itens em coluna única */
      [class*="CardGrid"],
      [class*="EntryList"] ul,
      [class*="Collection"] ul {
        grid-template-columns: 1fr !important;
        display: flex !important;
        flex-direction: column !important;
        padding: .75rem !important;
        gap: .75rem !important;
      }

      /* 10. Cards de entrada compactos */
      [class*="EntryCard"],
      [class*="CardBody"],
      [class*="ListEntry"] {
        padding: .85rem !important;
        width: 100% !important;
      }

      /* 11. Botões não cortados */
      [class*="ToolbarButton"],
      [class*="EditorButton"] {
        flex-shrink: 0 !important;
        white-space: nowrap !important;
      }
    }

    /* ══════════════════════════════════════════════════════════════
       RESPONSIVIDADE — TELAS ATÉ 600px
    ══════════════════════════════════════════════════════════════ */
    @media screen and (max-width: 600px) {

      /* Barra de pesquisa full width */
      [class*="SearchContainer"],
      [class*="SearchInput"],
      [class*="Searchbar"] {
        width: 100% !important;
        max-width: 100% !important;
      }

      /* Imagens na media library em grelha 2 colunas */
      [class*="ImageCard"],
      [class*="MediaCard"] {
        width: calc(50% - .5rem) !important;
      }

      /* Botões de ação menores para caber na tela */
      [class*="ToolbarButton"] {
        padding: .4rem .7rem !important;
        font-size: .8rem !important;
      }

      /* Reduz padding dos painéis */
      [class*="ControlPaneContainer"],
      [class*="FieldWrapper"] {
        padding: .5rem !important;
      }
    }

    /* ══════════════════════════════════════════════════════════════
       SCROLL SMOOTH — boas práticas
    ══════════════════════════════════════════════════════════════ */
    html { scroll-behavior: smooth; }
  </style>
</head>

<body>

  <!-- ══════════════════════════════════════════════════════════════
       TELA DE CARREGAMENTO ADVIC
       Visível enquanto o Decap CMS (SPA ~2 MB) inicializa.
       Ocultada automaticamente por JS quando o CMS renderizar.
  ══════════════════════════════════════════════════════════════ -->
  <div id="admin-loading" role="status" aria-live="polite" aria-label="Carregando painel administrativo">
    <img src="../imagens/logo.png" alt="Logo ADVIC" class="adm-logo" width="96" height="96" />
    <div class="adm-brand">
      <strong>Painel ADVIC</strong>
      <span>A carregar o painel administrativo…</span>
    </div>
    <div class="adm-bar-wrap" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
      <div class="adm-bar"></div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════════════
       DECAP CMS
       Carregado via jsDelivr (CDN rápido e estável).
       Versão @3 fixada para receber patches sem quebrar major.
       Documentação: https://decapcms.org/docs/
  ══════════════════════════════════════════════════════════════ -->
  <script src="https://cdn.jsdelivr.net/npm/decap-cms@3/dist/decap-cms.js"></script>

  <script>
    /* ── Estilos do site no painel de pré-visualização ────────── */
    /* Caminhos relativos ao domínio raiz (/), não à pasta /admin/ */
    CMS.registerPreviewStyle('/style.css');
    CMS.registerPreviewStyle('https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css');
    CMS.registerPreviewStyle('https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css');

    /* ── Preview: Evento ──────────────────────────────────────── */
    var EventoPreview = function(props) {
      var h   = window.React.createElement;
      var e   = props.entry;
      var get = function(k) { return e.getIn(['data', k]) || ''; };

      return h('div', { style: { padding: '1.5rem', fontFamily: 'Inter, sans-serif' } },
        h('div', {
          style: {
            background: '#fff',
            borderRadius: '14px',
            border: '1px solid #e5e7eb',
            overflow: 'hidden',
            maxWidth: '380px',
            boxShadow: '0 10px 24px rgba(0,0,0,.08)',
          }
        },
          get('imagem') && h('img', {
            src: get('imagem'),
            alt: get('titulo'),
            style: { width: '100%', height: '210px', objectFit: 'cover', display: 'block' }
          }),
          h('div', { style: { padding: '1rem' } },
            h('span', {
              style: {
                display: 'inline-block', padding: '.2rem .7rem',
                background: '#f5fbfc', color: '#0a5b61',
                borderRadius: '999px', fontSize: '.8rem',
                fontWeight: 700, marginBottom: '.5rem',
                border: '1px solid rgba(31,201,214,.2)'
              }
            }, get('tipo') || 'evento'),
            h('h3', { style: { fontFamily: 'Georgia, serif', color: '#0a5b61', margin: '.25rem 0' } },
              get('titulo') || 'Título do Evento'),
            h('p',  { style: { color: '#6b7280', fontSize: '.9rem', margin: '.5rem 0' } },
              get('dataExibicao') || 'Data do evento'),
            h('p',  { style: { fontSize: '.95rem', lineHeight: 1.6 } },
              get('descricao') || 'Descrição do evento.')
          )
        )
      );
    };
    CMS.registerPreviewTemplate('eventos', EventoPreview);

    /* ── Preview: Sermão ──────────────────────────────────────── */
    var SermaoPreview = function(props) {
      var h   = window.React.createElement;
      var e   = props.entry;
      var get = function(k) { return e.getIn(['data', k]) || ''; };

      return h('div', { style: { padding: '1.5rem', fontFamily: 'Inter, sans-serif' } },
        h('div', {
          style: {
            background: '#fff',
            borderRadius: '14px',
            border: '1px solid #e5e7eb',
            padding: '1.25rem',
            maxWidth: '420px',
            boxShadow: '0 10px 24px rgba(0,0,0,.08)',
          }
        },
          h('h3', { style: { fontFamily: 'Georgia, serif', color: '#0a5b61', marginBottom: '.25rem' } },
            get('titulo') || 'Título do Sermão'),
          h('p',  { style: { color: '#6b7280', fontSize: '.9rem', marginBottom: '1rem' } },
            get('pregadorData') || 'Pr. Nome — Data'),
          get('linkVideo') && h('a', {
            href: get('linkVideo'),
            target: '_blank',
            rel: 'noopener',
            style: {
              display: 'inline-flex', alignItems: 'center', gap: '.4rem',
              background: '#dc2626', color: '#fff',
              padding: '.5rem 1rem', borderRadius: '999px',
              textDecoration: 'none', fontSize: '.9rem', fontWeight: 600
            }
          }, '▶  Assistir no YouTube'),
          get('audioDisponivel') && h('p', {
            style: { marginTop: '.75rem', color: '#0f8c95', fontSize: '.9rem', fontWeight: 500 }
          }, '🎵  Áudio disponível')
        )
      );
    };
    CMS.registerPreviewTemplate('sermoes', SermaoPreview);

    /* ── Preview: Líder ───────────────────────────────────────── */
    var LiderPreview = function(props) {
      var h   = window.React.createElement;
      var e   = props.entry;
      var get = function(k) { return e.getIn(['data', k]) || ''; };

      return h('div', { style: { padding: '1.5rem', fontFamily: 'Inter, sans-serif' } },
        h('div', {
          style: {
            background: '#fff', borderRadius: '14px',
            border: '1px solid #e5e7eb', overflow: 'hidden',
            maxWidth: '220px', boxShadow: '0 10px 24px rgba(0,0,0,.08)',
            textAlign: 'center', padding: '1.25rem'
          }
        },
          get('imagem') && h('img', {
            src: get('imagem'), alt: get('nome'),
            style: { width: '120px', height: '120px', borderRadius: '50%',
                     objectFit: 'cover', display: 'block', margin: '0 auto .75rem' }
          }),
          h('h3', { style: { fontFamily: 'Georgia, serif', color: '#0a5b61',
                             fontSize: '1rem', marginBottom: '.25rem' } },
            get('nome') || 'Nome do Líder'),
          h('span', { style: { color: '#6b7280', fontSize: '.85rem' } },
            get('cargo') || 'Cargo / Função')
        )
      );
    };
    CMS.registerPreviewTemplate('lideranca', LiderPreview);

    /* ── Oculta a tela de carregamento quando o CMS renderizar ── */
    /* Estratégia: verificar periodicamente se o header do CMS     */
    /* está no DOM (sinal de que o React terminou de montar).      */
    var _loadingEl   = document.getElementById('admin-loading');
    var _hideLoader  = function() {
      if (_loadingEl) _loadingEl.classList.add('hidden');
    };
    var _checkReady  = setInterval(function() {
      var appReady =
        document.querySelector('#nc-root header')             ||
        document.querySelector('[class*="AppHeader"]')        ||
        document.querySelector('[class*="AppHeaderContent"]') ||
        document.querySelector('[data-testid="cms-main"]')    ||
        document.querySelector('.css-de3p5l')                 ||
        document.querySelector('header[class*="css-"]');
      if (appReady) { _hideLoader(); clearInterval(_checkReady); }
    }, 250);
    /* Fallback máximo: 8 s (rede lenta / dispositivos lentos) */
    setTimeout(function() { _hideLoader(); clearInterval(_checkReady); }, 8000);
  </script>

</body>
</html>
