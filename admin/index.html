<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel Institucional | ADVIC</title>

  <link rel="icon" type="image/png" href="../imagens/logo.png" />

  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <style>
    :root {
      --color-primary: #0f8c95;
    }

    [class*="AppHeader"],
    [class*="Button-button-default-primary"],
    [class*="Toggle-activeBackground"] {
      background-color: var(--color-primary) !important;
    }

    [class*="Button-button-default-primary"]:hover {
      background-color: #0b6b72 !important;
    }

    [class*="UI-text-primary"] {
      color: var(--color-primary) !important;
    }

    body {
      background-color: #f8f9fa;
    }
  </style>
</head>

<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <script>
    CMS.registerPreviewStyle("../style.css");

    CMS.registerPreviewStyle("https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css");

    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>
</body>

</html>
