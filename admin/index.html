<!DOCTYPE html>
<html lang="pt-PT">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Painel Institucional | ADVIC</title>

  <link rel="icon" type="image/png" href="../imagens/logo.png" />
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <style>
    :root {
      --color-primary: #0f8c95;
      --color-hover: #0b6b72;
      --color-bg: #f4f7f6;
    }

    body {
      background-color: var(--color-bg);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 0;
    }

    /* Cores do Login do Netlify */
    iframe#netlify-identity-widget {
      z-index: 9999 !important;
    }

    .netlify-identity-menu {
      background-color: var(--color-primary) !important;
    }

    /* Cores Gerais do Painel ADVIC */
    [class*="AppHeader"],
    [class*="Button-button-default-primary"],
    [class*="Toggle-activeBackground"] {
      background-color: var(--color-primary) !important;
    }

    [class*="Button-button-default-primary"]:hover {
      background-color: var(--color-hover) !important;
    }

    [class*="UI-text-primary"],
    [class*="TopBarNavList"] a:hover,
    [class*="SidebarLink"]:hover,
    [class*="SidebarLink-active"] {
      color: var(--color-primary) !important;
    }

    /* =========================================================
       FIX NUCLEAR PARA TELEMÓVEIS (DESTRÓI O JS DO CMS)
       ========================================================= */
    @media screen and (max-width: 850px) {

      /* 1. Força o esqueleto inteiro a empilhar verticalmente */
      #nc-root>div>div {
        display: flex !important;
        flex-direction: column !important;
        min-height: 100vh !important;
      }

      /* 2. Menu Lateral (Sidebar) ocupa o topo inteiro, sem margens laterais */
      aside {
        width: 100% !important;
        max-width: 100% !important;
        min-width: 100% !important;
        position: relative !important;
        border-right: none !important;
        border-bottom: 2px solid #e2e8f0 !important;
      }

      /* 3. Área Principal (Lista e Editor) ocupa o resto do ecrã */
      main {
        width: 100% !important;
        max-width: 100% !important;
        min-width: 100% !important;
      }

      /* 4. Destrói o divisor arrastável do React e a Pré-visualização */
      .Resizer,
      span[role="presentation"] {
        display: none !important;
      }

      .Pane,
      .Pane1 {
        width: 100% !important;
        max-width: 100% !important;
        position: static !important;
      }

      .Pane2,
      [class*="PreviewPane"] {
        display: none !important;
        /* Esconde a pré-visualização no telemóvel para não picotar */
      }

      /* 5. Ajusta o Editor para respeitar as margens do telemóvel */
      [class*="EditorContainer"] {
        padding: 0 !important;
        width: 100% !important;
      }

      [class*="ControlPaneContainer"] {
        width: 100% !important;
        max-width: 100% !important;
        padding: 15px !important;
      }

      /* 6. Impede que os campos de texto vazem do ecrã */
      input,
      textarea,
      select {
        width: 100% !important;
        max-width: 100% !important;
        box-sizing: border-box !important;
      }

      /* 7. Barra superior (Botão de Guardar) reorganizada */
      [class*="TopBarContainer"] {
        display: flex !important;
        flex-wrap: wrap !important;
        height: auto !important;
        padding: 10px !important;
      }

      [class*="TopBarContainer"]>div {
        width: 100% !important;
        flex: 1 1 100% !important;
      }
    }
  </style>
</head>

<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    CMS.registerPreviewStyle("../style.css");
    CMS.registerPreviewStyle("https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css");

    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>
</body>

</html>
