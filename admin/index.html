<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel Institucional | ADVIC</title>

  <link rel="icon" type="image/png" href="../imagens/logo.png" />
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <style>
    :root {
      --color-primary: #0f8c95;
      --color-hover: #0b6b72;
      --color-bg: #f4f7f6;
    }

    body {
      background-color: var(--color-bg);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 0;
    }

    /* Personalização do Login do Netlify */
    iframe#netlify-identity-widget {
      z-index: 9999 !important;
    }

    .netlify-identity-menu {
      background-color: var(--color-primary) !important;
    }

    /* Estilos Gerais do CMS (Cores da ADVIC) */
    [class*="AppHeader"],
    [class*="Button-button-default-primary"],
    [class*="Toggle-activeBackground"] {
      background-color: var(--color-primary) !important;
    }

    [class*="Button-button-default-primary"]:hover {
      background-color: var(--color-hover) !important;
    }

    [class*="UI-text-primary"],
    [class*="TopBarNavList"] a:hover,
    [class*="SidebarLink"]:hover,
    [class*="SidebarLink-active"] {
      color: var(--color-primary) !important;
    }

    /* =========================================================
       CORREÇÃO BRUTAL PARA CELULARES (MOBILE FIX)
       ========================================================= */
    @media screen and (max-width: 850px) {

      /* 1. Força o "esqueleto" inteiro do painel a empilhar de cima para baixo */
      [class*="AppMainContainer"] {
        display: flex !important;
        flex-direction: column !important;
      }

      /* 2. O Menu lateral agora vira um menu superior ocupando 100% do espaço */
      [class*="SidebarContainer"] {
        width: 100% !important;
        max-width: 100% !important;
        min-width: 100% !important;
        height: auto !important;
        padding: 15px !important;
        border-right: none !important;
        border-bottom: 2px solid #e2e8f0 !important;
        background-color: #fff !important;
      }

      /* 3. A área onde ficam os itens também ocupa 100% e empilha */
      [class*="CollectionContainer"],
      [class*="EditorContainer"] {
        width: 100% !important;
        max-width: 100% !important;
        min-width: 100% !important;
        display: flex !important;
        flex-direction: column !important;
        padding: 10px !important;
      }

      /* 4. Esconde a tela de visualização (Preview) que bugava o espaço no celular */
      [class*="PreviewPaneContainer"] {
        display: none !important;
      }

      /* 5. A tela de digitação (Editor) ganha toda a largura da tela */
      [class*="EditorPaneContainer"],
      [class*="ControlPaneContainer"] {
        width: 100% !important;
        max-width: 100% !important;
        min-width: 100% !important;
        padding: 0 !important;
      }

      /* 6. Ajusta a barra do topo (onde fica o botão Salvar) para não vazar da tela */
      [class*="TopBarContainer"] {
        display: flex !important;
        flex-wrap: wrap !important;
        height: auto !important;
        padding: 10px !important;
      }

      [class*="TopBarContainer"]>div {
        width: 100% !important;
        flex: 1 1 100% !important;
      }
    }
  </style>
</head>

<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    CMS.registerPreviewStyle("../style.css");
    CMS.registerPreviewStyle("https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css");

    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>
</body>

</html>
