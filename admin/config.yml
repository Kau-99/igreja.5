local_backend: true
backend:
  name: git-gateway
  branch: main

media_folder: "imagens"
public_folder: "imagens"

collections:
  - name: "paginas"
    label: "Páginas Fixas"
    files:
      - label: "Página Inicial"
        name: "inicio"
        file: "inicio.json"
        fields:
          - label: "Banner Principal (Topo)"
            name: "hero"
            widget: "object"
            fields:
              - {label: "Imagem de Fundo", name: "imagem", widget: "image"}
              - {label: "Título Principal", name: "titulo", widget: "string"}
              - {label: "Subtítulo", name: "subtitulo", widget: "string"}

  - name: "gerenciar_conteudo"
    label: "Conteúdo Dinâmico"
    files:
      - label: "Agenda de Eventos"
        name: "eventos"
        file: "eventos.json"
        fields:
          - label: "Lista de Eventos"
            name: "eventos"
            widget: "list"
            fields:
              - {label: "ID", name: "id", widget: "string"}
              - {label: "Título", name: "titulo", widget: "string"}
              - {label: "Tipo", name: "tipo", widget: "select", options: ["culto", "louvor", "familia", "vigilia"]}
              - {label: "Data ISO", name: "dataISO", widget: "datetime", format: "YYYY-MM-DDTHH:mm"}
              - {label: "Data Exibição", name: "dataExibicao", widget: "string"}
              - {label: "Descrição", name: "descricao", widget: "text"}
              - {label: "Imagem do Evento", name: "imagem", widget: "image"}
              - {label: "Link do Calendário", name: "linkCalendario", widget: "string", required: false}
              - {label: "Link do WhatsApp", name: "linkWhats", widget: "string", required: false}

      - label: "Sermões e Pregações"
        name: "sermoes"
        file: "sermoes.json"
        fields:
          - label: "Lista de Sermões"
            name: "sermoes"
            widget: "list"
            fields:
              - {label: "ID", name: "id", widget: "string"}
              - {label: "Título", name: "titulo", widget: "string"}
              - {label: "Pregador e Data", name: "pregadorData", widget: "string"}
              - {label: "Link do Vídeo", name: "linkVideo", widget: "string"}
              - {label: "Link do Áudio", name: "linkAudio", widget: "string", required: false}
              - {label: "Áudio Disponível?", name: "audioDisponivel", widget: "boolean", default: false}